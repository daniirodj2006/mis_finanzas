<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="theme-color" content="#C2185B"/>
  <title>Mis Finanzas 🌸</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body>

<!-- ═══ LOGIN ════════════════════════════════════════════════════ -->
<!-- sin pantalla de login -->

<!-- ═══ APP ═══════════════════════════════════════════════════════ -->
<div id="app">
  <div id="sidebar-overlay"></div>

  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="sb-profile">
      <div class="sb-avatar">
        <svg viewBox="0 0 24 24" fill="none" stroke="#C2185B" stroke-width="1.8">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
      </div>
      <div class="sb-name" id="sb-name">Dani</div>
      <div class="sb-email" id="sb-email">—</div>
      <div class="sb-tc">
        <span class="sb-tc-lbl">TC USD → CRC</span>
        <span class="sb-tc-val" id="tc-display">₡530</span>
        <span class="sb-tc-edit" id="tc-edit-btn">✎</span>
      </div>
      <div class="sync-status" id="sync-status">
        <span class="sync-dot synced" id="sync-dot"></span>
        <span id="sync-text">Sincronizado</span>
      </div>
    </div>
    <nav>
      <div class="nav-section">Principal</div>
      <div class="nav-item active" data-page="dashboard">
        <div class="ni-icon"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="2" width="7" height="7" rx="2"/><rect x="11" y="2" width="7" height="7" rx="2"/><rect x="2" y="11" width="7" height="7" rx="2"/><rect x="11" y="11" width="7" height="7" rx="2"/></svg></div>
        Dashboard
      </div>
      <div class="nav-item" data-page="ingresos">
        <div class="ni-icon"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M10 16V4M4 10l6-6 6 6"/></svg></div>
        Ingresos <span class="nav-badge" id="badge-ing">0</span>
      </div>
      <div class="nav-item" data-page="gastos">
        <div class="ni-icon"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M10 4v12M4 10l6 6 6-6"/></svg></div>
        Gastos <span class="nav-badge" id="badge-gas">0</span>
      </div>
      <div class="nav-section">Finanzas</div>
      <div class="nav-item" data-page="ahorros">
        <div class="ni-icon"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/><path d="M10 6v4l3 2"/></svg></div>
        Ahorros
      </div>
      <div class="nav-item" data-page="cuentas">
        <div class="ni-icon"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="5" width="16" height="11" rx="2"/><path d="M2 8h16"/><circle cx="6" cy="12" r="1" fill="#C2185B" stroke="none"/></svg></div>
        Cuentas
      </div>
      <div class="nav-item" data-page="recurrentes">
        <div class="ni-icon"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 10a7 7 0 107 7"/><path d="M3 6v4h4"/></svg></div>
        Recurrentes
      </div>
    </nav>
    <div class="sb-footer">
      <div class="sb-footer-btn" id="btn-export">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M10 3v10M6 9l4 4 4-4"/><path d="M3 15h14"/></svg>
        Exportar datos
      </div>
      <div class="sb-footer-btn" id="btn-logout">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 10h10M10 6l4 4-4 4"/><rect x="2" y="3" width="6" height="14" rx="1"/></svg>
        Borrar todos los datos
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <div id="main">
    <div id="topbar">
      <button id="menu-btn">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h14M3 10h14M3 14h14"/></svg>
      </button>
      <span class="topbar-title" id="topbar-title">Dashboard</span>
      <div class="topbar-selectors">
        <select id="month-sel">
          <option value="0">Enero</option><option value="1">Febrero</option>
          <option value="2">Marzo</option><option value="3">Abril</option>
          <option value="4">Mayo</option><option value="5">Junio</option>
          <option value="6">Julio</option><option value="7">Agosto</option>
          <option value="8">Septiembre</option><option value="9">Octubre</option>
          <option value="10">Noviembre</option><option value="11">Diciembre</option>
        </select>
        <select id="year-sel">
          <option>2024</option><option selected>2025</option><option>2026</option>
        </select>
      </div>
    </div>

    <div id="page-dashboard"   class="page active"></div>
    <div id="page-ingresos"    class="page"></div>
    <div id="page-gastos"      class="page"></div>
    <div id="page-ahorros"     class="page"></div>
    <div id="page-cuentas"     class="page"></div>
    <div id="page-recurrentes" class="page"></div>
  </div>
</div>

<button id="fab">
  <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
</button>
<div id="toast"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">Nuevo movimiento</div>
    <div class="type-toggle" id="type-toggle">
      <div class="type-btn active" data-type="ingreso">↑ Ingreso</div>
      <div class="type-btn" data-type="gasto">↓ Gasto</div>
      <div class="type-btn" data-type="ahorro">🐷 Ahorro</div>
    </div>
    <div class="form-group">
      <label class="form-label">Monto</label>
      <div style="display:flex;gap:8px">
        <select id="f-moneda" class="form-input" style="width:95px;flex-shrink:0">
          <option value="CRC">₡ CRC</option>
          <option value="USD">$ USD</option>
        </select>
        <input id="f-monto" type="number" class="form-input" placeholder="0" min="0" step="any"/>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Descripción</label>
      <input id="f-desc" type="text" class="form-input" placeholder="ej. Salario de abril"/>
    </div>
    <div class="form-group" id="f-subtipo-wrap">
      <label class="form-label">Tipo de ingreso</label>
      <select id="f-subtipo" class="form-input">
        <option>Salario</option><option>Ingreso extra</option>
        <option>Freelance</option><option>Beca</option><option>Otro</option>
      </select>
    </div>
    <div class="form-group" id="f-cat-wrap" style="display:none">
      <label class="form-label">Categoría</label>
      <div class="chip-group" id="cat-chips"></div>
    </div>
    <div class="form-group" id="f-method-wrap" style="display:none">
      <label class="form-label">Método de pago</label>
      <select id="f-method" class="form-input">
        <option>Efectivo</option><option>AMEX</option><option>Gold</option>
        <option>Transferencia CRC</option><option>Transferencia USD</option><option>Sinpe</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Fecha</label>
      <input id="f-fecha" type="date" class="form-input"/>
    </div>
    <div class="rec-card" id="rec-card">
      <div class="rec-top">
        <div>
          <div class="rec-ttl">¿Se repite?</div>
          <div class="rec-sub">Activa para automatizar este movimiento</div>
        </div>
        <button class="toggle-sw" id="rec-toggle"></button>
      </div>
      <div class="rec-body" id="rec-body">
        <div class="freq-row" id="freq-row">
          <button class="freq-btn" data-freq="Diario">Diario</button>
          <button class="freq-btn" data-freq="Semanal">Semanal</button>
          <button class="freq-btn active" data-freq="Mensual">Mensual</button>
          <button class="freq-btn" data-freq="Anual">Anual</button>
        </div>
        <div class="rec-details">
          <div class="rd-box"><div class="rd-lbl" id="rec-day-lbl">Día del mes</div><input class="rd-input" id="rec-day" type="number" min="1" max="31" value="1"/></div>
          <div class="rd-box"><div class="rd-lbl">Finaliza</div><select class="rd-input" id="rec-end"><option value="nunca">Sin fin</option><option value="fecha">Por fecha</option></select></div>
          <div class="rd-box"><div class="rd-lbl">Cuenta</div><select class="rd-input" id="rec-acc"><option>CRC</option><option>USD</option><option>AMEX</option><option>Gold</option></select></div>
        </div>
        <div class="rec-preview" id="rec-preview">Próximo: <strong>—</strong></div>
      </div>
    </div>
    <button class="btn-primary" id="btn-save-mov">Guardar</button>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
